name: Full Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push user-service image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cloudms-user-service:latest -f user-service/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cloudms-user-service:latest

      - name: Build and push product-service image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cloudms-product-service:latest -f product-service/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cloudms-product-service:latest

      - name: Build and push order-service image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cloudms-order-service:latest -f order-service/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cloudms-order-service:latest

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Create Terraform variables file
        working-directory: infrastructure/terraform/environments/dev
        run: |
          cat > terraform.auto.tfvars <<EOF
          ami_id      = "${{ secrets.TF_VAR_AMI_ID }}"
          key_name    = "${{ secrets.TF_VAR_KEY_NAME }}"
          db_password = "${{ secrets.TF_VAR_DB_PASSWORD }}"
          EOF

      - name: Terraform init
        working-directory: infrastructure/terraform/environments/dev
        run: terraform init

      - name: Terraform apply
        working-directory: infrastructure/terraform/environments/dev
        run: terraform apply -auto-approve

      - name: Get Terraform outputs
        id: tf-output
        working-directory: infrastructure/terraform/environments/dev
        run: |
          echo "EC2_PUBLIC_IP=$(terraform output -raw instance_public_ip)" >> $GITHUB_OUTPUT
          echo "DB_ENDPOINT=$(terraform output -raw db_endpoint)" >> $GITHUB_OUTPUT
          echo "SQS_QUEUE_URL=$(terraform output -raw order_created_queue_url)" >> $GITHUB_OUTPUT

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/cloudms-key.pem
          chmod 600 ~/.ssh/cloudms-key.pem

      - name: Create dynamic Ansible inventory
        run: |
          cat > ansible/inventory/hosts.ini <<EOF
          [web]
          ${{ steps.tf-output.outputs.EC2_PUBLIC_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/cloudms-key.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

      - name: Run Ansible deploy
        run: |
          ansible-playbook -i ansible/inventory/hosts.ini ansible/playbooks/deploy-services.yml \
            --extra-vars "dockerhub_username=${{ secrets.DOCKERHUB_USERNAME }}" \
            --extra-vars "db_endpoint=${{ steps.tf-output.outputs.DB_ENDPOINT }}" \
            --extra-vars "db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" \
            --extra-vars "sqs_queue_url=${{ steps.tf-output.outputs.SQS_QUEUE_URL }}" \
            --extra-vars "aws_region=us-east-1"
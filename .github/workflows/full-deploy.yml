name: Full Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push product-service image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cloudms-product-service:latest -f product-service/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cloudms-product-service:latest

      - name: Build and push order-service image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cloudms-order-service:latest -f order-service/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cloudms-order-service:latest

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infrastructure/terraform/environments/dev
        run: terraform init

      - name: Terraform apply
        working-directory: infrastructure/terraform/environments/dev
        run: terraform apply -auto-approve

      - name: Get EC2 public IP
        id: tf-output
        working-directory: infrastructure/terraform/environments/dev
        run: |
          echo "EC2_PUBLIC_IP=$(terraform output -raw instance_public_ip)" >> $GITHUB_OUTPUT

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/cloudms-key.pem
          chmod 600 ~/.ssh/cloudms-key.pem

      - name: Create dynamic Ansible inventory
        run: |
          cat > ansible/inventory/hosts.ini <<EOF
          [web]
          ${{ steps.tf-output.outputs.EC2_PUBLIC_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/cloudms-key.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

      - name: Run Ansible deploy
        run: |
          ansible-playbook -i ansible/inventory/hosts.ini ansible/playbooks/deploy-hello.yml